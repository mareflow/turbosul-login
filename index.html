<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TurboSul - Controle de Produção</title>
    
    <!-- Inclusão do Tailwind CSS via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Importação da fonte 'Inter' do Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

    <!-- Estilos customizados e animações -->
    <style>
        /* Define a fonte 'Inter' como padrão para toda a página */
        body {
            font-family: 'Inter', sans-serif;
        }

        /* Animação de entrada para o card de login */
        @keyframes fadeInScaleUp {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .animate-entry {
            animation: fadeInScaleUp 0.5s ease-out forwards;
        }
        
        /* Melhora a aparência do placeholder */
        .custom-placeholder::placeholder {
            color: #9CA3AF; /* text-gray-400 */
        }

        /* Estilo para inputs (conforme o visual da imagem) */
        .input-style {
            background-color: #f7f9fa; /* Um cinza muito claro, próximo ao #f1f5f9 do bg-slate-100 */
        }
    </style>
</head>
<body class="bg-slate-100 flex items-center justify-center min-h-screen px-4">

    <!-- Card de Login com animação de entrada -->
    <main class="w-full max-w-md bg-white rounded-xl shadow-lg p-10 animate-entry">
        <!-- Seção do Logo e Título -->
        <div class="flex flex-col items-center mb-8">
            <img src="https://i.postimg.cc/Jh5Jvrc9/IMG-7901.png" alt="Logo TurboSul" class="w-28 h-28 mb-4">
            <h1 class="text-xl font-bold text-gray-800">TurboSul - Controle de Produção</h1>
        </div>

        <!-- Formulário de Login -->
        <form id="login-form" class="space-y-6">
            <!-- Campo de Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-600 mb-2">Usuário</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required
                    placeholder="seu.email@turbosul.com"
                    class="custom-placeholder input-style w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300"
                >
            </div>

            <!-- Campo de Senha -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-600 mb-2">Senha</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required
                    placeholder="Sua senha"
                    class="custom-placeholder input-style w-full px-4 py-3 border border-gray-300 rounded-lg text-gray-800 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-300"
                >
            </div>

            <!-- Botão de Entrar -->
            <div>
                <button 
                    type="submit"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg focus:outline-none focus:ring-4 focus:ring-blue-600 focus:ring-opacity-50 transition-all duration-300 ease-in-out"
                >
                    Entrar
                </button>
            </div>
        </form>

        <!-- Mensagem de Erro -->
        <div class="mt-6 text-center h-5"> 
            <p id="error-message" class="text-sm font-medium text-red-600"></p>
        </div>
    </main>

    <!-- Inclusão da biblioteca do Supabase via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Lógica de Autenticação com JavaScript Puro (CORRIGIDA) -->
    <script>
        // 1. Inicialização do Cliente Supabase
        const SUPABASE_URL = 'https://zghaqlaqozsskfldgsfe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnaGFxbGFxb3pzc2tmbGRnc2ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyMDY1MzQsImV4cCI6MjA4NDc4MjUzNH0.aC2DMOUNhS2uK6KGI5Sf2c2vGhrCKHMnRyZhL3WwSus';
        
        // CORREÇÃO APLICADA AQUI: Usando 'supabaseClient' para a instância
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // 2. Lógica do Formulário de Login
        const loginForm = document.getElementById('login-form');
        const errorMessage = document.getElementById('error-message');
        const DESTINATION_URL = 'https://mareflow.github.io/turbosul-prevendas/';

        loginForm.addEventListener('submit', async (event) => {
            event.preventDefault();

            errorMessage.textContent = '';

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            // Chamada CORRIGIDA: Usa a nova variável 'supabaseClient'
            const { error } = await supabaseClient.auth.signInWithPassword({
                email: email,
                password: password,
            });

            // 3. Tratamento da Resposta
            if (error) {
                errorMessage.textContent = 'Usuário ou senha inválidos.';
            } else {
                window.location.href = DESTINATION_URL;
            }
        });
    </script>
</body>
</html>

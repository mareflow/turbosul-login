<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | TurboSul</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Google Fonts - Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- FontAwesome para Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-focus:focus {
            border-color: #2563EB;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
            outline: none;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col justify-between">

    <!-- LOGIN CARD -->
    <main class="flex-1 flex items-center justify-center p-6">
        <div class="bg-white w-full max-w-sm rounded-3xl shadow-xl border border-slate-100 p-8">
            
            <div class="text-center mb-8">
                <!-- Substituído o escudo azul pela Logo Oficial da TurboSul -->
                <img src="https://i.postimg.cc/Jh5Jvrc9/IMG-7901.png" alt="TurboSul Logo" class="h-16 mx-auto mb-4 object-contain">
                <h2 class="text-2xl font-black text-slate-900 uppercase tracking-tighter">Entrar no Sistema</h2>
                <p class="text-xs text-slate-400 font-medium mt-1">Acesse sua estação de trabalho produtiva</p>
            </div>

            <!-- Formulário de Login -->
            <form id="login-form" class="space-y-5">
                <!-- E-mail -->
                <div>
                    <label for="login-email" class="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-2">E-mail Corporativo</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <i class="fa-regular fa-envelope"></i>
                        </span>
                        <input type="email" id="login-email" required placeholder="seu.nome@turbosul.com.br" 
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm font-semibold text-slate-800 input-focus transition-all">
                    </div>
                </div>

                <!-- Senha -->
                <div>
                    <label for="login-password" class="block text-[10px] font-black text-slate-500 uppercase tracking-wider mb-2">Senha</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">
                            <i class="fa-solid fa-lock"></i>
                        </span>
                        <input type="password" id="login-password" required placeholder="Digite sua senha" 
                               class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm font-semibold text-slate-800 input-focus transition-all">
                    </div>
                </div>

                <!-- Botão Submit -->
                <button type="submit" id="btn-submit-login" 
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest shadow-lg shadow-blue-100 transition duration-150 flex items-center justify-center">
                    <i class="fa-solid fa-right-to-bracket mr-2"></i> Conectar Estação
                </button>
            </form>
        </div>
    </main>

    <!-- NOTIFICAÇÕES (Toast) -->
    <div id="toast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 pointer-events-none transition-all duration-300 z-50 flex items-center space-x-3 bg-slate-900 text-white px-5 py-3.5 rounded-2xl shadow-xl border border-slate-800 text-xs font-black uppercase tracking-wider">
        <span id="toast-icon" class="text-lg"></span>
        <span id="toast-message">--</span>
    </div>

    <!-- FOOTER -->
    <footer class="py-3 text-center border-t bg-white/40 backdrop-blur-sm z-10">
        <div class="flex items-center justify-center space-x-2">
            <span class="text-[9px] font-black text-slate-400 uppercase tracking-[0.2em]">Desenvolvido por</span>
            <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Maré Flow</span>
            <span class="text-slate-300">|</span>
            <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter italic">TurboSul Controle de Produção © 2026</span>
        </div>
    </footer>

    <!-- Supabase SDK e Lógica de Login/Roteamento -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://zghaqlaqozsskfldgsfe.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpnaGFxbGFxb3pzc2tmbGRnc2ZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjkyMDY1MzQsImV4cCI6MjA4NDc4MjUzNH0.aC2DMOUNhS2uK6KGI5Sf2c2vGhrCKHMnRyZhL3WwSus';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- MAPA DE DIRECIONAMENTO OFICIAL (Tabela de Páginas) ---
        const ROLE_REDIRECTS = {
            'PRE-VENDAS': 'https://mareflow.github.io/turbosul-prevendas/',
            'ANALISE-TECNICA': 'https://mareflow.github.io/analise-tecnica/',
            'VENDAS': 'https://mareflow.github.io/decisa-comercialvendas/',
            'TRIAGEM': 'https://mareflow.github.io/triagem/',
            'DESMONTAGEM': 'https://mareflow.github.io/desmontagem/',
            'RETIFICA': 'https://mareflow.github.io/retifica/',
            'SOLDA': 'https://mareflow.github.io/solda/',
            'METROLOGIA': 'https://mareflow.github.io/metrologia/',
            'BANCADA': 'https://mareflow.github.io/bancada/',
            'BALANCEAMENTO': 'https://mareflow.github.io/balanceamento/',
            'MONTAGEM': 'https://mareflow.github.io/montagem/',
            'CONTROLE-QUALIDADE': 'https://mareflow.github.io/qualidade/',
            'EXPEDICAO': 'https://mareflow.github.io/expedicao/',
            'ADMINISTRADOR': 'https://mareflow.github.io/admin/',
            'QUADRO-PRODUCAO': 'https://mareflow.github.io/quadrodeproducao/'
        };

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = document.getElementById('toast-icon');
            const msg = document.getElementById('toast-message');

            msg.innerText = message;
            toast.classList.remove('border-green-500', 'border-red-500');

            if (type === 'success') {
                icon.innerHTML = `<i class="fa-regular fa-circle-check text-green-500"></i>`;
                toast.classList.add('border-green-500');
            } else {
                icon.innerHTML = `<i class="fa-regular fa-circle-xmark text-red-500"></i>`;
                toast.classList.add('border-red-500');
            }

            toast.classList.remove('opacity-0', 'translate-y-20', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');

            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-20', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 4000);
        }

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            const btn = document.getElementById('btn-submit-login');

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner animate-spin mr-2"></i> Autenticando...`;

            try {
                // 1. Tenta autenticar o usuário
                const { data, error } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (error) {
                    showToast(error.message, 'error');
                    btn.disabled = false;
                    btn.innerHTML = `<i class="fa-solid fa-right-to-bracket mr-2"></i> Conectar Estação`;
                    return;
                }

                if (data && data.user) {
                    let role = data.user.user_metadata?.role;

                    // 2. CONTINGÊNCIA: Se não estiver no user_metadata, busca na tabela profiles
                    if (!role) {
                        const { data: profile, error: profileError } = await supabaseClient
                            .from('profiles')
                            .select('role')
                            .eq('id', data.user.id)
                            .single();
                        
                        if (!profileError && profile) {
                            role = profile.role;
                        }
                    }

                    // 3. REDIRECIONAMENTO DINÂMICO
                    const targetUrl = ROLE_REDIRECTS[role];
                    if (targetUrl) {
                        showToast('Autenticado com sucesso! Redirecionando...');
                        setTimeout(() => {
                            window.location.href = targetUrl;
                        }, 1000);
                    } else {
                        // Se o papel não for mapeado, envia para a tela geral (Quadro de Produção)
                        window.location.href = 'https://mareflow.github.io/quadrodeproducao/';
                    }
                }

            } catch (err) {
                console.error(err);
                showToast('Falha na conexão de rede.', 'error');
                btn.disabled = false;
                btn.innerHTML = `<i class="fa-solid fa-right-to-bracket mr-2"></i> Conectar Estação`;
            }
        });
    </script>
</body>
</html>
